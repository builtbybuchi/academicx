# .github/workflows/deploy.yml
name: Build & Deploy to Cloudflare R2

on:
  push:
    branches:
      - main

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.find-apps.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover buildable apps
        id: find-apps
        run: |
          APPS=()
          # Search for any directory containing a package.json with a "build" script
          while IFS= read -r pkg; do
            DIR=$(dirname "$pkg")
            # Skip root and node_modules
            if [[ "$DIR" == "." ]] || echo "$DIR" | grep -q "node_modules"; then
              continue
            fi
            # Check if it has a build script
            if node -e "const p=require('./$pkg'); process.exit(p.scripts && p.scripts.build ? 0 : 1)" 2>/dev/null; then
              APPS+=("$DIR")
            fi
          done < <(find . -name "package.json" -not -path "*/node_modules/*" -not -path "./.git/*")

          # Convert to JSON array for matrix
          JSON=$(printf '%s\n' "${APPS[@]}" | jq -R . | jq -sc .)
          echo "apps=$JSON" >> $GITHUB_OUTPUT
          echo "✅ Found apps: $JSON"

  deploy:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
      fail-fast: false  # Deploy other apps even if one fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build

      - name: Detect build output directory
        id: build-out
        working-directory: ${{ matrix.app }}
        run: |
          # Check common build output folders in order of preference
          for DIR in dist out build .next/static public; do
            if [ -d "$DIR" ]; then
              echo "out_dir=${{ matrix.app }}/$DIR"  >> $GITHUB_OUTPUT
              echo "✅ Build output: $DIR"
              exit 0
            fi
          done
          echo "❌ Could not detect build output directory"
          exit 1

      - name: Generate bucket name
        id: bucket
        run: |
          REPO="${{ github.event.repository.name }}"
          # Sanitize app path to a slug: apps/landing-page → landing-page
          APP_SLUG=$(echo "${{ matrix.app }}" | sed 's|^\./||' | sed 's|/|-|g' | tr '[:upper:]' '[:lower:]')
          # Stable 6-digit hash from repo + app name
          HASH=$(echo -n "${REPO}-${APP_SLUG}" | sha256sum | tr -d '[:alpha:]' | cut -c1-6)
          BUCKET="${REPO}-${APP_SLUG}-${HASH}"
          # R2 bucket names max 63 chars, lowercase, no consecutive hyphens
          BUCKET=$(echo "$BUCKET" | cut -c1-63 | sed 's/--*/-/g' | sed 's/-$//')
          echo "name=$BUCKET" >> $GITHUB_OUTPUT
          echo "slug=$APP_SLUG" >> $GITHUB_OUTPUT
          echo "✅ Bucket name: $BUCKET"

      - name: Create R2 bucket (idempotent)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/r2/buckets" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${{ steps.bucket.outputs.name }}\"}")

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "409" ]; then
            echo "✅ Bucket ready (HTTP $RESPONSE)"
          else
            echo "❌ Unexpected response: $RESPONSE"
            exit 1
          fi

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          rclone config create r2 s3 \
            provider Cloudflare \
            access_key_id "$R2_ACCESS_KEY_ID" \
            secret_access_key "$R2_SECRET_ACCESS_KEY" \
            endpoint "https://$CF_ACCOUNT_ID.r2.cloudflarestorage.com"

      - name: Sync build to R2
        run: |
          rclone sync ${{ steps.build-out.outputs.out_dir }} r2:${{ steps.bucket.outputs.name }} \
            --transfers 8 \
            --checkers 16 \
            --delete-during \
            --progress

      - name: Enable public access & print URL
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          BUCKET="${{ steps.bucket.outputs.name }}"

          # Enable public development URL
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/r2/buckets/${BUCKET}/policy" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"public": true}' > /dev/null

          # Fetch the actual pub- URL Cloudflare assigned to this bucket
          BUCKET_INFO=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/r2/buckets/${BUCKET}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")

          PUBLIC_URL=$(echo "$BUCKET_INFO" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          domain = data.get('result', {}).get('public_domain', '')
          print(domain)
          ")

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "App:    ${{ steps.bucket.outputs.slug }}"
          echo "URL:    https://${PUBLIC_URL}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"