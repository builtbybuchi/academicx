name: Build Desktop and Mobile Apps

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows installers'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux installers'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS installers'
        type: boolean
        default: true
      build_android:
        description: 'Build Android APKs'
        type: boolean
        default: true
      school_code:
        description: 'School code (e.g. SHMCE)'
        type: string
        default: 'ACADEMICX'
      logo_url:
        description: 'School logo URL (leave blank to use default AcademicX logo)'
        type: string
        default: ''

jobs:
  # ─── WINDOWS BUILD ────────────────────────────────────────────────────────

  build-windows:
    if: inputs.build_windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Activate MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Remove Git linker conflict from PATH
        shell: powershell
        run: |
          $paths = $env:PATH -split ';' | Where-Object {
            $_ -notmatch '\\Git\\usr\\bin' -and
            $_ -notmatch '\\Git\\bin' -and
            $_ -notmatch '\\mingw64\\bin' -and
            $_ -notmatch '\\mingw32\\bin'
          }
          echo "PATH=$($paths -join ';')" >> $env:GITHUB_ENV

      - name: Install root dependencies
        run: npm install

      - name: Build Windows apps
        shell: powershell
        run: |
          $logoArg = ""
          if ("${{ inputs.logo_url }}" -ne "") {
            $logoArg = "--logo-url ${{ inputs.logo_url }}"
          }
          Invoke-Expression "node scripts/build-tauri-apps.mjs --school-code ${{ inputs.school_code }} $logoArg"

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: installers/win32/
          retention-days: 30

  # ─── LINUX BUILD ──────────────────────────────────────────────────────────

  build-linux:
    if: inputs.build_linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install root dependencies
        run: npm install

      - name: Build Linux apps
        run: |
          LOGO_ARG=""
          if [ -n "${{ inputs.logo_url }}" ]; then
            LOGO_ARG="--logo-url ${{ inputs.logo_url }}"
          fi
          node scripts/build-tauri-apps.mjs --school-code ${{ inputs.school_code }} $LOGO_ARG

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: installers/linux/
          retention-days: 30

  # ─── MACOS BUILD ──────────────────────────────────────────────────────────

  build-macos:
    if: inputs.build_macos
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Install root dependencies
        run: npm install

      - name: Build macOS apps
        run: |
          LOGO_ARG=""
          if [ -n "${{ inputs.logo_url }}" ]; then
            LOGO_ARG="--logo-url ${{ inputs.logo_url }}"
          fi
          node scripts/build-tauri-apps.mjs --school-code ${{ inputs.school_code }} $LOGO_ARG

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: installers/darwin/
          retention-days: 30

 # ─── ANDROID APK BUILD ────────────────────────────────────────────────────

  build-android:
    if: inputs.build_android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.11902837"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > ${{ github.workspace }}/academicx-release.jks

      - name: Build and sign Android APKs
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          for APP in admin-app staff-app student-parent-app; do
            echo "=== Building Android APK for $APP ==="
            cd ${{ github.workspace }}/apps/$APP
            npm install

            # Write signing config into local.properties
            cat >> src-tauri/gen/android/local.properties << EOF
          storeFile=${{ github.workspace }}/academicx-release.jks
          storePassword=${ANDROID_STORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

            # Download logo if provided
            LOGO_ARG=""
            if [ -n "${{ inputs.logo_url }}" ]; then
              LOGO_ARG="--logo-url ${{ inputs.logo_url }}"
            fi

            # Build the frontend first
            npm run build

            # Build Android APK
            npm exec -- tauri android build -- --apk

            cd ${{ github.workspace }}
          done

      - name: Collect Android APKs
        run: |
          mkdir -p ${{ github.workspace }}/installers/android
          for APP in admin-app staff-app student-parent-app; do
            mkdir -p ${{ github.workspace }}/installers/android/$APP
            find ${{ github.workspace }}/apps/$APP/src-tauri/gen/android \
              -name "*.apk" \
              -exec cp {} ${{ github.workspace }}/installers/android/$APP/ \;
          done

      - name: Verify APKs were created
        run: |
          echo "=== APK files found ==="
          find ${{ github.workspace }}/installers/android -name "*.apk" -ls
          APK_COUNT=$(find ${{ github.workspace }}/installers/android -name "*.apk" | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK files were generated!"
            exit 1
          fi
          echo "Total APKs: $APK_COUNT"

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: installers/android/
          retention-days: 30

  # ─── iOS BUILD (disabled — enable when Apple Developer account is ready) ──

  build-ios:
    if: false
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Install Apple signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: temp-keychain-password
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install root dependencies
        run: npm install

      - name: Build iOS IPAs
        run: |
          LOGO_ARG=""
          if [ -n "${{ inputs.logo_url }}" ]; then
            LOGO_ARG="--logo-url ${{ inputs.logo_url }}"
          fi
          for APP in admin-app staff-app student-parent-app; do
            echo "=== Building iOS IPA for $APP ==="
            cd apps/$APP
            npm install
            npm exec -- tauri ios build
            cd ../..
          done

      - name: Collect iOS IPAs
        run: |
          mkdir -p installers/ios
          for APP in admin-app staff-app student-parent-app; do
            mkdir -p installers/ios/$APP
            find apps/$APP/src-tauri/gen/apple -name "*.ipa" \
              -exec cp {} installers/ios/$APP/ \;
          done

      - name: Upload iOS IPAs
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipas
          path: installers/ios/
          retention-days: 30