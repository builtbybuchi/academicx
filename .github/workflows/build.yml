name: Build Desktop and Mobile Apps

on:
  push:
    branches: [main]

jobs:
  # ─── DESKTOP BUILDS (Windows, Linux, macOS) ───────────────────────────────

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Activate MSVC environment (Windows only)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install root dependencies
        run: npm install

      - name: Build all desktop apps
        run: node scripts/build-tauri-apps.mjs --school-code ACADEMICX

      - name: Upload Windows installers
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: installers/win32/
          retention-days: 30

      - name: Upload Linux installers
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: installers/linux/
          retention-days: 30

      - name: Upload macOS installers
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: installers/darwin/
          retention-days: 30

  # ─── ANDROID APK BUILD ────────────────────────────────────────────────────

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.11902837"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install root dependencies
        run: npm install

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > academicx-release.jks

      - name: Build and sign Android APKs
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          for APP in admin-app staff-app student-parent-app; do
            echo "=== Building Android APK for $APP ==="
            cd apps/$APP
            npm install

            cat >> src-tauri/gen/android/local.properties << EOF
          storeFile=../../../../academicx-release.jks
          storePassword=${ANDROID_STORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

            npm exec -- tauri android build -- --apk
            cd ../..
          done

      - name: Collect Android APKs
        run: |
          mkdir -p installers/android
          for APP in admin-app staff-app student-parent-app; do
            mkdir -p installers/android/$APP
            find apps/$APP/src-tauri/gen/android -name "*.apk" \
              -exec cp {} installers/android/$APP/ \;
          done

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: installers/android/
          retention-days: 30

  # ─── iOS BUILD (disabled — enable when Apple Developer account is ready) ──

  build-ios:
    if: false
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Install Apple signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: temp-keychain-password
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install root dependencies
        run: npm install

      - name: Build iOS IPAs
        run: |
          for APP in admin-app staff-app student-parent-app; do
            echo "=== Building iOS IPA for $APP ==="
            cd apps/$APP
            npm install
            npm exec -- tauri ios build
            cd ../..
          done

      - name: Collect iOS IPAs
        run: |
          mkdir -p installers/ios
          for APP in admin-app staff-app student-parent-app; do
            mkdir -p installers/ios/$APP
            find apps/$APP/src-tauri/gen/apple -name "*.ipa" \
              -exec cp {} installers/ios/$APP/ \;
          done

      - name: Upload iOS IPAs
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipas
          path: installers/ios/
          retention-days: 30