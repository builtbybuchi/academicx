# .github/workflows/deploy-staging.yml
name: Deploy Staging (Appwrite + Frontends)

on:
  push:
    branches:
      - staging

jobs:
  provision-appwrite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run Appwrite Setup with Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          cd backend
          npm install --omit=dev
          doppler run --project academicx --config stg -- node setup-appwrite.js

  discover:
    needs: provision-appwrite
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.find-apps.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover buildable apps
        id: find-apps
        run: |
          APPS=()
          while IFS= read -r pkg; do
            DIR=$(dirname "$pkg")
            if [[ "$DIR" == "." ]] || echo "$DIR" | grep -q "node_modules"; then
              continue
            fi
            if node -e "const p=require('./$pkg'); process.exit(p.scripts && p.scripts.build ? 0 : 1)" 2>/dev/null; then
              APPS+=("$DIR")
            fi
          done < <(find . -name "package.json" -not -path "*/node_modules/*" -not -path "./.git/*")

          JSON=$(printf '%s\n' "${APPS[@]}" | jq -R . | jq -sc .)
          echo "apps=$JSON" >> $GITHUB_OUTPUT
          echo "Found apps: $JSON"

  deploy-frontend:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Build with Doppler
        working-directory: ${{ matrix.app }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project academicx --config stg -- npm run build

      - name: Detect build output directory
        id: build-out
        working-directory: ${{ matrix.app }}
        run: |
          for DIR in dist out build .next/static public; do
            if [ -d "$DIR" ]; then
              echo "out_dir=${{ matrix.app }}/$DIR" >> $GITHUB_OUTPUT
              echo "Build output: $DIR"
              exit 0
            fi
          done
          echo "Could not detect build output directory"
          exit 1

      - name: Generate bucket name
        id: bucket
        run: |
          REPO="${{ github.event.repository.name }}"
          APP_SLUG=$(echo "${{ matrix.app }}" | sed 's|^\./||' | sed 's|^apps/||' | sed 's|/|-|g' | tr '[:upper:]' '[:lower:]')
          ENV_SUFFIX=stg
          HASH=$(echo -n "${REPO}-${APP_SLUG}-${ENV_SUFFIX}" | sha256sum | tr -d '[:alpha:]' | cut -c1-6)
          BUCKET="${REPO}-${APP_SLUG}-${ENV_SUFFIX}-${HASH}"
          BUCKET=$(echo "$BUCKET" | cut -c1-63 | sed 's/--*/-/g' | sed 's/-$//')
          echo "name=$BUCKET" >> $GITHUB_OUTPUT
          echo "slug=${APP_SLUG}-${ENV_SUFFIX}" >> $GITHUB_OUTPUT
          echo "Bucket name: $BUCKET"

      - name: Create R2 bucket (idempotent)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/r2/buckets" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${{ steps.bucket.outputs.name }}\"}")

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "409" ]; then
            echo "Bucket ready (HTTP $RESPONSE)"
          else
            echo "Unexpected response: $RESPONSE"
            exit 1
          fi

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          rclone config create r2 s3 \
            provider Cloudflare \
            access_key_id "$R2_ACCESS_KEY_ID" \
            secret_access_key "$R2_SECRET_ACCESS_KEY" \
            endpoint "https://$CF_ACCOUNT_ID.r2.cloudflarestorage.com"

      - name: Sync build to R2
        run: |
          rclone sync ${{ steps.build-out.outputs.out_dir }} r2:${{ steps.bucket.outputs.name }} \
            --transfers 8 \
            --checkers 16 \
            --delete-during \
            --progress

      - name: Deploy Worker (CDN + index.html routing)
        id: worker
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          BUCKET="${{ steps.bucket.outputs.name }}"
          SLUG="${{ steps.bucket.outputs.slug }}"
          REPO="${{ github.event.repository.name }}"
          WORKER_NAME="${REPO}-${SLUG}"

          # Truncate worker name to 63 chars (Cloudflare limit)
          WORKER_NAME=$(echo "$WORKER_NAME" | cut -c1-63 | sed 's/-$//')

          cat > /tmp/worker.js << 'WORKER_EOF'
          const CACHE_TTL_IMMUTABLE = 31536000; // 1 year — hashed assets (e.g. main.abc123.js)
          const CACHE_TTL_HTML      = 0;        // no cache — HTML always fresh

          function getMimeType(path) {
            const ext = path.split(".").pop().toLowerCase();
            const types = {
              html: "text/html; charset=utf-8",
              css:  "text/css",
              js:   "application/javascript",
              json: "application/json",
              png:  "image/png",
              jpg:  "image/jpeg",
              jpeg: "image/jpeg",
              gif:  "image/gif",
              svg:  "image/svg+xml",
              ico:  "image/x-icon",
              woff: "font/woff",
              woff2:"font/woff2",
              ttf:  "font/ttf",
              webp: "image/webp",
              txt:  "text/plain",
              xml:  "application/xml",
              map:  "application/json",
            };
            return types[ext] || "application/octet-stream";
          }

          function isImmutable(path) {
            // Vite/CRA/webpack hashed filenames contain a content hash — safe to cache forever
            return /\.[a-f0-9]{8,}\.(js|css|woff2?|png|jpg|svg|webp)$/.test(path);
          }

          async function serveFromR2(env, key, request) {
            const cache = caches.default;

            // 1. Check Cloudflare edge cache first
            const cached = await cache.match(request);
            if (cached) return cached;

            // 2. Fetch from R2
            const object = await env.BUCKET.get(key);
            if (!object) return null;

            const contentType = object.httpMetadata?.contentType || getMimeType(key);
            const isHtml = contentType.startsWith("text/html");
            const ttl = isHtml ? CACHE_TTL_HTML : isImmutable(key) ? CACHE_TTL_IMMUTABLE : 3600;

            const headers = new Headers({
              "Content-Type": contentType,
              "Cache-Control": ttl === 0
                ? "no-cache, no-store, must-revalidate"
                : `public, max-age=${ttl}${ttl === CACHE_TTL_IMMUTABLE ? ", immutable" : ""}`,
              "ETag": object.etag || "",
            });

            const response = new Response(object.body, { headers });

            // 3. Store in edge cache (only cacheable responses)
            if (ttl > 0) {
              await cache.put(request, response.clone());
            }

            return response;
          }

          export default {
            async fetch(request, env) {
              const url  = new URL(request.url);
              let path   = url.pathname;

              // Normalise: strip trailing slash (except root)
              if (path !== "/" && path.endsWith("/")) {
                path = path.slice(0, -1);
              }

              // Determine R2 key to try
              let key;
              if (path === "/" || !path.includes(".")) {
                // Directory or SPA route → try <path>/index.html then root index.html
                key = (path === "/" ? "" : path.slice(1)) + (path.endsWith("index.html") ? "" : (path === "/" ? "index.html" : "/index.html"));
              } else {
                key = path.slice(1); // strip leading /
              }

              // Try exact key
              let response = await serveFromR2(env, key, request);

              // SPA fallback: any unmatched route → root index.html
              if (!response) {
                response = await serveFromR2(env, "index.html", new Request(new URL("/index.html", request.url).toString()));
              }

              if (!response) {
                return new Response("Not Found", { status: 404 });
              }

              return response;
            },
          };
          WORKER_EOF

          # Deploy the Worker
          DEPLOY_RESPONSE=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -F "metadata={\"main_module\":\"worker.js\",\"bindings\":[{\"type\":\"r2_bucket\",\"name\":\"BUCKET\",\"bucket_name\":\"${BUCKET}\"}],\"compatibility_date\":\"2024-09-23\"};type=application/json" \
            -F "worker.js=@/tmp/worker.js;type=application/javascript+module")

          echo "$DEPLOY_RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('success'):
              print('Worker deployed')
          else:
              print('Worker deploy failed:', d.get('errors'))
              sys.exit(1)
          "

          # Enable workers.dev subdomain for this worker
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/subdomain" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}' > /dev/null

          # Get account workers.dev subdomain
          SUBDOMAIN=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('result',{}).get('subdomain',''))")

          WORKER_URL="https://${WORKER_NAME}.${SUBDOMAIN}.workers.dev"
          echo "worker_url=${WORKER_URL}" >> $GITHUB_OUTPUT
          echo "Worker URL: ${WORKER_URL}"

      - name: Save result
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          BUCKET="${{ steps.bucket.outputs.name }}"
          SLUG="${{ steps.bucket.outputs.slug }}"
          WORKER_URL="${{ steps.worker.outputs.worker_url }}"

          mkdir -p /tmp/results
          echo "{\"app\": \"${SLUG}\", \"bucket\": \"${BUCKET}\", \"url\": \"${WORKER_URL}\"}" \
            > /tmp/results/${SLUG}.json

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "App:  $SLUG"
          echo "URL:  $WORKER_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Upload result fragment
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ steps.bucket.outputs.slug }}
          path: /tmp/results/${{ steps.bucket.outputs.slug }}.json

  summarize:
    needs: deploy-frontend
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all result fragments
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
          path: /tmp/results

      - name: Merge into deployments.json
        run: |
          python3 << 'EOF'
          import json, os, glob
          from datetime import datetime

          files = glob.glob("/tmp/results/*.json")
          deployments = []
          for f in sorted(files):
              with open(f) as fp:
                  deployments.append(json.load(fp))

          output = {
              "deployments": deployments,
              "timestamp": datetime.utcnow().isoformat() + "Z"
          }

          print(json.dumps(output, indent=2))

          with open("deployments.json", "w") as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Upload deployments.json
        uses: actions/upload-artifact@v4
        with:
          name: deployment-urls
          path: deployments.json