name: Build Desktop and Mobile Apps

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows installers'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux installers'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS installers'
        type: boolean
        default: true
      build_android:
        description: 'Build Android APKs'
        type: boolean
        default: true
      upload_to_r2:
        description: 'Upload artifacts to Cloudflare R2 and update Appwrite'
        type: boolean
        default: true

jobs:
  build-windows:
    if: inputs.build_windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Activate MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Remove Git linker conflict from PATH
        shell: powershell
        run: |
          $paths = $env:PATH -split ';' | Where-Object {
            $_ -notmatch '\\Git\\usr\\bin' -and
            $_ -notmatch '\\Git\\bin' -and
            $_ -notmatch '\\mingw64\\bin' -and
            $_ -notmatch '\\mingw32\\bin'
          }
          echo "PATH=$($paths -join ';')" >> $env:GITHUB_ENV

      - name: Install root dependencies
        run: npm install

      - name: Build Windows apps from Appwrite schools
        shell: powershell
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          $uploadArg = ""
          if ("${{ inputs.upload_to_r2 }}" -eq "true") {
            $uploadArg = "--upload-r2"
          }
          Invoke-Expression "doppler run --project academicx --config stg -- node scripts/build-all-schools.mjs $uploadArg"

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: installers/win32/
          retention-days: 30

  build-linux:
    if: inputs.build_linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install root dependencies
        run: npm install

      - name: Build Linux apps from Appwrite schools
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          uploadArg=""
          if [ "${{ inputs.upload_to_r2 }}" = "true" ]; then
            uploadArg="--upload-r2"
          fi
          doppler run --project academicx --config stg -- node scripts/build-all-schools.mjs $uploadArg

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: installers/linux/
          retention-days: 30

  build-macos:
    if: inputs.build_macos
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Install root dependencies
        run: npm install

      - name: Build macOS apps from Appwrite schools
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          uploadArg=""
          if [ "${{ inputs.upload_to_r2 }}" = "true" ]; then
            uploadArg="--upload-r2"
          fi
          doppler run --project academicx --config stg -- node scripts/build-all-schools.mjs $uploadArg

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: installers/darwin/
          retention-days: 30

  build-android:
    if: inputs.build_android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/admin-app/src-tauri
            apps/staff-app/src-tauri
            apps/student-parent-app/src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=/usr/local/lib/android/sdk/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > ${{ github.workspace }}/academicx-release.jks

      - name: Add tauri script to each app package.json
        run: |
          for APP in admin-app staff-app student-parent-app; do
            cd ${{ github.workspace }}/apps/$APP
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.scripts = pkg.scripts || {};
              pkg.scripts.tauri = 'tauri';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            "
            cd ${{ github.workspace }}
          done

      - name: Build and sign Android APKs from Appwrite schools
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          uploadArg=""
          if [ "${{ inputs.upload_to_r2 }}" = "true" ]; then
            uploadArg="--upload-r2"
          fi
          doppler run --project academicx --config stg -- node scripts/build-android-schools.mjs $uploadArg

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: installers/
          retention-days: 30
