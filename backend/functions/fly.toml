app = "academicx-functions"
primary_region = "fra"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[processes]
  app = "npm start"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
